# ─── Puerto (Railway lo define automáticamente) ───
server.port=${PORT:8080}

# ─── Base de datos ───
# En local usa MySQL de XAMPP. En Railway usa las variables de entorno.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/rutaya_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Admin ───
rutaya.admin.usuario=${ADMIN_USUARIO:admin}
rutaya.admin.password=${ADMIN_PASSWORD:Rutaya2026!}
